name: Trigger Jenkins SonarQube Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number (Leave blank if testing a branch directly)'
        required: false
        default: '0'
      pr_branch:
        description: 'Branch to scan'
        required: true
        default: 'main'
      pr_base:
        description: 'Base branch to compare against'
        required: true
        default: 'main'

jobs:
  trigger-jenkins:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jenkins Parameterized Job
        run: |
          curl -X POST "http://${{ secrets.JENKINS_PUBLIC_IP }}:8080/job/django-sonar-scan/buildWithParameters" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            --data "PR_NUMBER=${{ github.event.pull_request.number }}" \
            --data "PR_BRANCH=${{ github.event.pull_request.head.ref }}" \
            --data "PR_BASE=${{ github.event.pull_request.base.ref }}"
